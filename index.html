<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Aplikasi...</title>
    <style>
        /* Mengatur agar halaman memenuhi layar dan menghilangkan scrollbar bawaan */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #ffffff;
        }
        
        /* Mengatur iframe agar fullscreen dan responsif */
        #gas-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe id="gas-iframe" src="https://script.google.com/macros/s/AKfycbyVs6MIeDDDEbAz_EbjUEu7NnEh5RD_lTeOv-5bVkJIQYOFWucA-E-DD4IZ4i35RCcg/exec" allowfullscreen="true">
        Browser Anda tidak mendukung iframe.
    </iframe>

</body>
</html>
